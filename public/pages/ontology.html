<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ontology — Michael Quintin</title>
  <meta name="description" content="An interactive map of ideas and their connections.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">

  <style>
    /* ── Ontology-specific styles ── */
    html, body { height: 100%; overflow: hidden; }

    .ontology-wrapper {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg-primary);
    }

    /* Canvas takes the full screen */
    #graph-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Header bar (over the graph) ── */
    .onto-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(10,10,10,0.7);
      border-bottom: 1px solid var(--border);
      transition: background var(--transition-med);
    }
    [data-theme="light"] .onto-header {
      background: rgba(245,245,240,0.8);
    }

    .onto-header-left {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .onto-back {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: color 0.2s;
    }
    .onto-back:hover { color: var(--text-primary); opacity: 1; }
    .onto-back svg { width: 14px; height: 14px; }

    .onto-title {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .onto-header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* Search */
    .onto-search {
      position: relative;
    }
    .onto-search input {
      font-family: var(--font-main);
      font-size: 0.8rem;
      padding: 8px 14px 8px 32px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      outline: none;
      width: 200px;
      transition: border-color 0.2s, width 0.3s;
    }
    .onto-search input:focus {
      border-color: var(--accent);
      width: 260px;
    }
    .onto-search input::placeholder { color: var(--text-muted); }
    .onto-search svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px; height: 14px;
      color: var(--text-muted);
    }

    /* ── Legend ── */
    .onto-legend {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 16px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: opacity 0.3s;
    }
    .onto-legend-title {
      font-weight: 600;
      letter-spacing: 0.15em;
      margin-bottom: 4px;
      color: var(--text-secondary);
    }
    .onto-legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .onto-legend-item:hover { color: var(--text-primary); }
    .onto-legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Detail panel (right side, slides in) ── */
    .onto-detail {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 380px;
      z-index: 200;
      background: var(--bg-primary);
      border-left: 1px solid var(--border);
      padding: 80px 32px 32px;
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      overflow-y: auto;
    }
    .onto-detail.open {
      transform: translateX(0);
    }
    .onto-detail-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: 1px solid var(--border);
      width: 32px; height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      transition: border-color 0.2s, color 0.2s;
    }
    .onto-detail-close:hover {
      border-color: var(--text-primary);
      color: var(--text-primary);
    }
    .onto-detail-category {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .onto-detail-category .cat-dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .onto-detail h2 {
      font-size: 1.8rem;
      font-weight: 200;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 20px;
    }
    .onto-detail-desc {
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.8;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }
    .onto-detail-connections-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .onto-detail-connection {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--text-secondary);
      transition: border-color 0.2s, color 0.2s;
    }
    .onto-detail-connection:hover {
      border-color: var(--accent);
      color: var(--text-primary);
    }
    .onto-detail-connection .conn-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }

    /* ── Controls hint ── */
    .onto-controls {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: right;
      line-height: 1.8;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .onto-detail { width: 100%; }
      .onto-search input { width: 140px; }
      .onto-search input:focus { width: 180px; }
      .onto-legend { display: none; }
      .onto-controls { display: none; }
    }
  </style>
</head>
<body>

  <div class="ontology-wrapper">
    <!-- SVG Graph -->
    <svg id="graph-canvas"></svg>

    <!-- Header -->
    <div class="onto-header">
      <div class="onto-header-left">
        <a href="../index.html" class="onto-back">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 12H5m0 0l7 7m-7-7l7-7"/></svg>
          Home
        </a>
        <span class="onto-title">Conceptual Ontology</span>
      </div>
      <div class="onto-header-right">
        <div class="onto-search">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>
          <input type="text" id="searchInput" placeholder="Search concepts...">
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m-8-9H3m16 0h1m-2.636-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" style="display:none"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
        </button>
      </div>
    </div>

    <!-- Legend -->
    <div class="onto-legend" id="legend"></div>

    <!-- Controls hint -->
    <div class="onto-controls">
      Drag to move nodes<br>
      Scroll to zoom<br>
      Click node to inspect
    </div>

    <!-- Detail Panel -->
    <div class="onto-detail" id="detailPanel">
      <button class="onto-detail-close" id="detailClose">
        <svg width="14" height="14" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
      <div class="onto-detail-category" id="detailCategory"></div>
      <h2 id="detailTitle"></h2>
      <p class="onto-detail-desc" id="detailDesc"></p>
      <div class="onto-detail-connections-title">Connected To</div>
      <div id="detailConnections"></div>
    </div>
  </div>

  <!-- D3.js (loaded from CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

  <!-- Ontology data -->
  <script src="../js/ontology-data.js"></script>

  <script>
    // ─── Theme Toggle ────────────────────────────────────
    const toggle = document.getElementById('themeToggle');
    const sun = toggle.querySelector('.icon-sun');
    const moon = toggle.querySelector('.icon-moon');
    function setTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('theme', t);
      sun.style.display = t === 'dark' ? 'block' : 'none';
      moon.style.display = t === 'light' ? 'block' : 'none';
      updateColors();
    }
    setTheme(localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'));
    toggle.addEventListener('click', () => {
      setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    // ─── Helpers ─────────────────────────────────────────
    const catMap = {};
    ONTOLOGY_CATEGORIES.forEach(c => catMap[c.id] = c);

    const sizeMap = { sm: 6, md: 10, lg: 16, xl: 22 };

    function getColor(catId) {
      return catMap[catId] ? catMap[catId].color : '#888';
    }

    function getRadius(size) {
      return sizeMap[size] || sizeMap.md;
    }

    function isDark() {
      return document.documentElement.getAttribute('data-theme') === 'dark';
    }

    // ─── Build graph data from ontology ──────────────────
    const nodeMap = {};
    ONTOLOGY_NODES.forEach(n => nodeMap[n.id] = n);

    const nodes = ONTOLOGY_NODES.map(n => ({
      id: n.id,
      label: n.label,
      category: n.category,
      description: n.description,
      size: n.size || 'md',
      radius: getRadius(n.size),
      linkedIds: n.links || []
    }));

    // Build edges (deduplicated)
    const edgeSet = new Set();
    const edges = [];
    ONTOLOGY_NODES.forEach(n => {
      (n.links || []).forEach(targetId => {
        const key = [n.id, targetId].sort().join('--');
        if (!edgeSet.has(key) && nodeMap[targetId]) {
          edgeSet.add(key);
          edges.push({ source: n.id, target: targetId });
        }
      });
    });

    // ─── SVG Setup ───────────────────────────────────────
    const svg = d3.select('#graph-canvas');
    const width = window.innerWidth;
    const height = window.innerHeight;
    svg.attr('width', width).attr('height', height);

    // Container for zoom/pan
    const g = svg.append('g');

    // Zoom behavior
    const zoom = d3.zoom()
      .scaleExtent([0.2, 5])
      .on('zoom', (event) => {
        g.attr('transform', event.transform);
      });
    svg.call(zoom);

    // Center the initial view
    svg.call(zoom.transform, d3.zoomIdentity.translate(width / 2, height / 2).scale(0.9));

    // ─── Force Simulation ────────────────────────────────
    const simulation = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(edges).id(d => d.id).distance(120).strength(0.4))
      .force('charge', d3.forceManyBody().strength(-300).distanceMax(500))
      .force('center', d3.forceCenter(0, 0))
      .force('collision', d3.forceCollide().radius(d => d.radius + 20))
      .force('x', d3.forceX(0).strength(0.03))
      .force('y', d3.forceY(0).strength(0.03));

    // ─── Draw Edges ──────────────────────────────────────
    const linkGroup = g.append('g').attr('class', 'links');
    const link = linkGroup.selectAll('line')
      .data(edges)
      .enter().append('line')
      .attr('stroke-width', 1)
      .attr('stroke-opacity', 0.2);

    // ─── Draw Nodes ──────────────────────────────────────
    const nodeGroup = g.append('g').attr('class', 'nodes');
    const node = nodeGroup.selectAll('g')
      .data(nodes)
      .enter().append('g')
      .attr('cursor', 'pointer')
      .call(d3.drag()
        .on('start', dragStarted)
        .on('drag', dragged)
        .on('end', dragEnded)
      );

    // Outer glow ring
    node.append('circle')
      .attr('class', 'node-glow')
      .attr('r', d => d.radius + 8)
      .attr('fill', 'none')
      .attr('stroke', d => getColor(d.category))
      .attr('stroke-width', 1)
      .attr('stroke-opacity', 0)
      .style('transition', 'stroke-opacity 0.3s');

    // Main circle
    node.append('circle')
      .attr('class', 'node-circle')
      .attr('r', d => d.radius)
      .attr('fill', d => getColor(d.category))
      .attr('fill-opacity', 0.8)
      .attr('stroke', d => getColor(d.category))
      .attr('stroke-width', 1.5)
      .attr('stroke-opacity', 0.3)
      .style('transition', 'fill-opacity 0.3s, r 0.3s');

    // Labels
    node.append('text')
      .attr('class', 'node-label')
      .attr('dy', d => d.radius + 16)
      .attr('text-anchor', 'middle')
      .attr('font-family', "'Barlow', sans-serif")
      .attr('font-size', d => d.size === 'xl' ? '12px' : d.size === 'lg' ? '11px' : '10px')
      .attr('font-weight', d => d.size === 'xl' || d.size === 'lg' ? '500' : '400')
      .attr('letter-spacing', '0.04em')
      .text(d => d.label);

    // ─── Hover / Click ───────────────────────────────────
    let selectedNode = null;

    node.on('mouseenter', function(event, d) {
      if (selectedNode) return;
      highlightNode(d);
    }).on('mouseleave', function(event, d) {
      if (selectedNode) return;
      resetHighlight();
    }).on('click', function(event, d) {
      event.stopPropagation();
      selectedNode = d;
      highlightNode(d);
      openDetail(d);
    });

    svg.on('click', () => {
      selectedNode = null;
      resetHighlight();
      closeDetail();
    });

    // ─── Highlight Logic ─────────────────────────────────
    function highlightNode(d) {
      const connectedIds = new Set(d.linkedIds);
      connectedIds.add(d.id);

      // Also find nodes that link TO this node
      ONTOLOGY_NODES.forEach(n => {
        if ((n.links || []).includes(d.id)) connectedIds.add(n.id);
      });

      node.select('.node-circle')
        .attr('fill-opacity', n => connectedIds.has(n.id) ? 1 : 0.15)
        .attr('stroke-opacity', n => connectedIds.has(n.id) ? 0.6 : 0.05);

      node.select('.node-glow')
        .attr('stroke-opacity', n => n.id === d.id ? 0.4 : 0);

      node.select('.node-label')
        .attr('fill-opacity', n => connectedIds.has(n.id) ? 1 : 0.15);

      link
        .attr('stroke-opacity', l => {
          const srcId = typeof l.source === 'object' ? l.source.id : l.source;
          const tgtId = typeof l.target === 'object' ? l.target.id : l.target;
          return (srcId === d.id || tgtId === d.id) ? 0.5 : 0.04;
        })
        .attr('stroke-width', l => {
          const srcId = typeof l.source === 'object' ? l.source.id : l.source;
          const tgtId = typeof l.target === 'object' ? l.target.id : l.target;
          return (srcId === d.id || tgtId === d.id) ? 2 : 1;
        });
    }

    function resetHighlight() {
      node.select('.node-circle')
        .attr('fill-opacity', 0.8)
        .attr('stroke-opacity', 0.3);
      node.select('.node-glow')
        .attr('stroke-opacity', 0);
      node.select('.node-label')
        .attr('fill-opacity', 1);
      link
        .attr('stroke-opacity', 0.2)
        .attr('stroke-width', 1);
    }

    // ─── Detail Panel ────────────────────────────────────
    const detailPanel = document.getElementById('detailPanel');
    const detailClose = document.getElementById('detailClose');
    const detailTitle = document.getElementById('detailTitle');
    const detailCategory = document.getElementById('detailCategory');
    const detailDesc = document.getElementById('detailDesc');
    const detailConnections = document.getElementById('detailConnections');

    function openDetail(d) {
      const cat = catMap[d.category];
      detailCategory.innerHTML = `<span class="cat-dot" style="background:${cat ? cat.color : '#888'}"></span>${cat ? cat.label : d.category}`;
      detailTitle.textContent = d.label;
      detailDesc.textContent = d.description;

      // Find all connected nodes
      const connectedIds = new Set(d.linkedIds);
      ONTOLOGY_NODES.forEach(n => {
        if ((n.links || []).includes(d.id)) connectedIds.add(n.id);
      });

      detailConnections.innerHTML = '';
      connectedIds.forEach(id => {
        if (id === d.id) return;
        const n = nodeMap[id];
        if (!n) return;
        const nCat = catMap[n.category];
        const el = document.createElement('div');
        el.className = 'onto-detail-connection';
        el.innerHTML = `<span class="conn-dot" style="background:${nCat ? nCat.color : '#888'}"></span>${n.label}`;
        el.addEventListener('click', () => {
          const target = nodes.find(nd => nd.id === id);
          if (target) {
            selectedNode = target;
            highlightNode(target);
            openDetail(target);
          }
        });
        detailConnections.appendChild(el);
      });

      detailPanel.classList.add('open');
    }

    function closeDetail() {
      detailPanel.classList.remove('open');
    }

    detailClose.addEventListener('click', (e) => {
      e.stopPropagation();
      selectedNode = null;
      resetHighlight();
      closeDetail();
    });

    // ─── Search ──────────────────────────────────────────
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.toLowerCase().trim();
      if (!q) {
        resetHighlight();
        selectedNode = null;
        closeDetail();
        return;
      }
      const matches = nodes.filter(n =>
        n.label.toLowerCase().includes(q) ||
        (n.description && n.description.toLowerCase().includes(q))
      );
      if (matches.length === 1) {
        selectedNode = matches[0];
        highlightNode(matches[0]);
        openDetail(matches[0]);
      } else if (matches.length > 1) {
        const matchIds = new Set(matches.map(m => m.id));
        node.select('.node-circle')
          .attr('fill-opacity', n => matchIds.has(n.id) ? 1 : 0.1);
        node.select('.node-label')
          .attr('fill-opacity', n => matchIds.has(n.id) ? 1 : 0.1);
        link.attr('stroke-opacity', 0.04);
      }
    });

    // ─── Legend ───────────────────────────────────────────
    const legend = document.getElementById('legend');
    legend.innerHTML = '<div class="onto-legend-title">Domains</div>';
    ONTOLOGY_CATEGORIES.forEach(cat => {
      const item = document.createElement('div');
      item.className = 'onto-legend-item';
      item.innerHTML = `<span class="onto-legend-dot" style="background:${cat.color}"></span>${cat.label}`;
      item.addEventListener('click', () => {
        const catNodes = nodes.filter(n => n.category === cat.id);
        if (catNodes.length > 0) {
          const matchIds = new Set(catNodes.map(m => m.id));
          node.select('.node-circle')
            .attr('fill-opacity', n => matchIds.has(n.id) ? 1 : 0.1);
          node.select('.node-label')
            .attr('fill-opacity', n => matchIds.has(n.id) ? 1 : 0.1);
          link.attr('stroke-opacity', 0.04);
          selectedNode = null;
          closeDetail();
        }
      });
      legend.appendChild(item);
    });

    // ─── Color updater (theme-aware) ─────────────────────
    function updateColors() {
      const dark = isDark();
      const edgeColor = dark ? '#ffffff' : '#000000';
      const labelColor = dark ? '#e8e8e8' : '#1a1a1a';

      link.attr('stroke', edgeColor);
      node.select('.node-label').attr('fill', labelColor);
    }
    updateColors();

    // ─── Simulation tick ─────────────────────────────────
    simulation.on('tick', () => {
      link
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);

      node.attr('transform', d => `translate(${d.x},${d.y})`);
    });

    // ─── Drag Handlers ───────────────────────────────────
    function dragStarted(event, d) {
      if (!event.active) simulation.alphaTarget(0.1).restart();
      d.fx = d.x;
      d.fy = d.y;
    }
    function dragged(event, d) {
      d.fx = event.x;
      d.fy = event.y;
    }
    function dragEnded(event, d) {
      if (!event.active) simulation.alphaTarget(0);
      d.fx = null;
      d.fy = null;
    }

    // ─── Resize ──────────────────────────────────────────
    window.addEventListener('resize', () => {
      const w = window.innerWidth;
      const h = window.innerHeight;
      svg.attr('width', w).attr('height', h);
    });

    // ─── Animate in ──────────────────────────────────────
    g.attr('opacity', 0);
    setTimeout(() => {
      g.transition().duration(1200).attr('opacity', 1);
    }, 200);
  </script>
</body>
</html>
